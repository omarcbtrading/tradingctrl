<script type="text/babel" data-presets="react,env">
const { useState, useEffect, useRef, useCallback } = React;

const Toggle = ({on,onChange,colorOn="#0284c7"}) => (

// ─── Setup Screen ─────────────────────────────────────────────────────────────
function SetupScreen({onDone}) {
  const [cfg, setCfg]   = useState('');
  const [ws,  setWs]    = useState('');
  const [err, setErr]   = useState('');
  const [testing, setTesting] = useState(false);

  const connect = async () => {
    setErr(''); setTesting(true);
    try {
      // Strip any wrapping: "const firebaseConfig = {...};" or just the object
      let raw = cfg.trim()
        .replace(/^const\s+firebaseConfig\s*=\s*/,'')
        .replace(/^var\s+firebaseConfig\s*=\s*/,'')
        .replace(/^let\s+firebaseConfig\s*=\s*/,'')
        .replace(/;?\s*$/, '');

      // Parse as JS object (handles both unquoted keys and proper JSON)
      let parsed;
      try {
        // Try JSON first
        parsed = JSON.parse(raw);
      } catch {
        // Fall back to JS object evaluation (Firebase default format)
        // eslint-disable-next-line no-new-func
        parsed = new Function('return (' + raw + ')')();
      }

      if(!parsed || typeof parsed !== 'object') throw new Error("No se pudo leer la configuración");
      if(!parsed.apiKey)       throw new Error("Falta apiKey en la configuración");
      if(!parsed.databaseURL)  throw new Error("Falta databaseURL. Asegúrate de haber creado la Realtime Database y de copiar la URL (empieza por https://...)");
      if(!ws.trim())           throw new Error("Introduce un nombre de workspace");

      // Test connection
      if(firebase.apps.length) { for(const a of firebase.apps) await a.delete(); }
      const app = firebase.initializeApp(parsed);
      const db  = firebase.database(app);
      await db.ref(`tradingctrl/${ws.trim()}/ping`).set(Date.now());

      localStorage.setItem(FB_CFG_KEY, JSON.stringify(parsed));
      localStorage.setItem(WS_KEY, ws.trim());
      setTesting(false);
      onDone(parsed, ws.trim());
    } catch(e) {
      setErr(e.message || 'Error de conexión');
      setTesting(false);
    }
  };

  return (
    <div className="setup-wrap">
      <div className="setup-card">
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:3,marginBottom:4}}>
          TRADING<span style={{color:"#0284c7"}}>CTRL</span>
        </div>
        <div style={{fontSize:12,color:"#6b7280",marginBottom:32,fontWeight:500}}>
          Configuración inicial · Sincronización en la nube
        </div>

        {/* Steps */}
        <div style={{background:"#f0f9ff",border:"1.5px solid #bae6fd",borderRadius:10,padding:20,marginBottom:28}}>
          <div style={{fontSize:10,color:"#0284c7",fontWeight:700,letterSpacing:1.5,marginBottom:16}}>CÓMO CONFIGURARLO (5 MIN, GRATIS)</div>

          {[
            [1, <>Ve a <strong><a href="https://console.firebase.google.com" target="_blank" style={{color:"#0284c7"}}>console.firebase.google.com</a></strong> e inicia sesión con tu Google.</>],
            [2, <>Pulsa <strong>«Crear un proyecto»</strong>. Ponle el nombre que quieras (ej: <code>mi-trading</code>). Desactiva Google Analytics si te lo pide.</>],
            [3, <>Dentro del proyecto, en el menú lateral ve a <strong>«Compilación» → «Realtime Database»</strong>. Pulsa <strong>«Crear base de datos»</strong>. Elige la región más cercana (ej: europe-west1). Empieza en <strong>«Modo de prueba»</strong>.</>],
            [4, <>Ahora ve al icono ⚙️ → <strong>«Configuración del proyecto»</strong>. Baja hasta <strong>«Tus apps»</strong> → <strong>«&lt;/&gt; Web»</strong>. Registra la app (nombre libre) y copia el objeto <code>firebaseConfig</code>.</>],
            [5, <>Pega ese objeto en el campo de abajo y elige un nombre de workspace (actúa como tu clave personal).</>],
          ].map(([n,t])=>(
            <div key={n} className="step-row">
              <span className="step-num">{n}</span>
              <div className="step-text">{t}</div>
            </div>
          ))}
        </div>

        <div style={{marginBottom:16}}>
          <label className="lbl">Pega aquí tu firebaseConfig</label>
          <textarea className="inp-ta" placeholder={`const firebaseConfig = {\n  apiKey: "AIza...",\n  authDomain: "mi-proyecto.firebaseapp.com",\n  databaseURL: "https://mi-proyecto-default-rtdb.europe-west1.firebasedatabase.app",\n  projectId: "mi-proyecto",\n  storageBucket: "mi-proyecto.appspot.com",\n  messagingSenderId: "123456789",\n  appId: "1:123..."\n};`}
            value={cfg} onChange={e=>setCfg(e.target.value)}
            style={{fontFamily:"monospace",fontSize:11,minHeight:120}}/>
          <div style={{fontSize:10,color:"#6b7280",marginTop:5,lineHeight:1.6}}>
            Pega directamente el bloque que te da Firebase — con o sin <code style={{background:"#f0f4f8",padding:"1px 4px",borderRadius:3,fontSize:10}}>const firebaseConfig =</code>, se acepta cualquier formato.
          </div>
        </div>

        <div style={{marginBottom:20}}>
          <label className="lbl">Nombre del workspace (tu clave personal)</label>
          <input className="inp" type="text" placeholder="ej: omar-trading-2025"
            value={ws} onChange={e=>setWs(e.target.value)}/>
          <div style={{fontSize:10,color:"#9ca3af",marginTop:5}}>
            Solo tú conocerás este nombre. Es tu identificador único dentro de la base de datos.
          </div>
        </div>

        {err&&<div style={{background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:6,padding:"10px 14px",fontSize:11,color:"#dc2626",marginBottom:14,fontWeight:500}}>{err}</div>}

        <button className="btn" style={{width:"100%",justifyContent:"center",fontSize:12,padding:"12px"}}
          onClick={connect} disabled={testing||!cfg.trim()||!ws.trim()}>
          <Ic d={ICONS.cloud} s={14} c="#fff"/>
          {testing?"Conectando…":"Conectar y empezar"}
        </button>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function TradingApp({db, workspace, onReset}) {
  const [rows,    setRows]    = useState([]);
  const [syncStatus, setSyncStatus] = useState("connecting"); // connecting | ok | error
  const [tab,     setTab]     = useState("dash");
  const [form,    setForm]    = useState(null);
  const [preview, setPreview] = useState(null);
  const [fy,      setFy]      = useState(String(CY));
  const [fperiod, setFperiod] = useState("month");
  const [fidx,    setFidx]    = useState("all");
  const [ftype,   setFtype]   = useState("all");
  const [ffirm,   setFfirm]   = useState("all");
  const fileRef     = useRef();
  const importJSONRef = useRef();
  const dbRef = db.ref(`tradingctrl/${workspace}/entries`);

  // ── Real-time listener ────────────────────────────────────────────────────
  useEffect(()=>{
    setSyncStatus("connecting");
    // Load from localStorage first as fallback
    const stored = localStorage.getItem("tradingctrl_local_backup");
    if(stored) {
      try {
        const data = JSON.parse(stored);
        if(data && Array.isArray(data)) setRows(data);
      } catch {}
    }
    
    // Try to connect to Firebase
    const unsub = dbRef.on("value", snap=>{
      const val = snap.val();
      let data = val ? Object.values(val) : [];
      data.sort((a,b)=>new Date(b.date)-new Date(a.date));
      setRows(data);
      // Save to localStorage as backup
      try { localStorage.setItem("tradingctrl_local_backup", JSON.stringify(data)); } catch {}
      setSyncStatus("ok");
    }, err=>{
      console.error("Firebase error:", err);
      setSyncStatus("error");
    });
    
    return ()=>dbRef.off("value", unsub);
  },[]);

  // ── Guardar/borrar entradas INDIVIDUALES (evita "Write too large") ────────
  const saveEntry = useCallback((entry)=>{
    setSyncStatus("syncing");
    try { localStorage.setItem("tradingctrl_local_backup", JSON.stringify(rows)); } catch {}
    dbRef.child(entry.id).set(entry)
      .then(()=>setSyncStatus("ok"))
      .catch(e=>{console.error("Save error:",e);setSyncStatus("error");});
  },[rows]);

  const deleteEntry = useCallback((id)=>{
    setSyncStatus("syncing");
    dbRef.child(id).remove()
      .then(()=>setSyncStatus("ok"))
      .catch(e=>{console.error("Delete error:",e);setSyncStatus("error");});
  },[]);

  const EMPTY = {
    id:"", date:NOW.toISOString().slice(0,10), type:"in", cat:CAT_IN[0],
    firm:"", desc:"", currency:"EUR",
    grossAmountNative:"",
    splitEnabled:false, splitPct:"",
    deductEnabled:false, feeIntermediary:"", feeTransfer:"",
    amount:"", rate:"", files:[],
  };

  const recalc = n => {
    if(n.type!=="in"||n.cat!=="Retiro PropFirm") return n;
    const gross = parseFloat(n.grossAmountNative)||0;
    const sp    = n.splitEnabled&&n.splitPct?parseFloat(n.splitPct)/100:1;
    const fI    = n.deductEnabled?(parseFloat(n.feeIntermediary)||0):0;
    const fT    = n.deductEnabled?(parseFloat(n.feeTransfer)||0):0;
    n.amount    = gross>0?Math.max(0,gross*sp-fI-fT).toFixed(2):"";
    return n;
  };

  const patch = p=>setForm(f=>recalc({...f,...p}));

  // Filters
  const years=[...new Set(rows.map(r=>String(getY(r.date))))].sort().reverse();
  if(!years.includes(String(CY))) years.unshift(String(CY));

  const inView=rows.filter(r=>{
    if(fy!=="all"&&String(getY(r.date))!==fy) return false;
    if(ftype!=="all"&&r.type!==ftype) return false;
    if(ffirm!=="all"&&r.firm!==ffirm) return false;
    if(fidx!=="all"){
      const i=parseInt(fidx);
      if(fperiod==="month"&&getM(r.date)!==i) return false;
      if(fperiod==="quarter"&&getQ(r.date)!==i) return false;
    }
    return true;
  });

  const totalIn  = inView.filter(r=>r.type==="in").reduce((s,r)=>s+toEUR(r),0);
  const totalOut = inView.filter(r=>r.type==="out").reduce((s,r)=>s+toEUR(r),0);
  const net      = totalIn-totalOut;
  const roi      = totalOut>0?(net/totalOut)*100:null;

  // Detect display currency from visible entries
  const viewCurrencies = [...new Set(inView.map(r=>r.currency||"EUR"))];
  const displayCurrency = viewCurrencies.length===1 ? viewCurrencies[0] : "MIX";
  const fmtD = displayCurrency==="USD" ? fU : fE;
  const currLabel = displayCurrency==="USD" ? "USD" : displayCurrency==="MIX" ? "EUR+USD*" : "EUR";

  const cyStr  = fy==="all"?String(CY):fy;
  const monthly=MONTHS.map((_,mi)=>{
    const me=rows.filter(r=>String(getY(r.date))===cyStr&&getM(r.date)===mi);
    const i=me.filter(r=>r.type==="in").reduce((s,r)=>s+toEUR(r),0);
    const o=me.filter(r=>r.type==="out").reduce((s,r)=>s+toEUR(r),0);
    return {mi,i,o,net:i-o};
  });
  const maxBar=Math.max(...monthly.map(m=>Math.max(m.i,m.o)),1);

  const allFirmsUsed=[...new Set(rows.filter(r=>r.firm).map(r=>r.firm))];
  const firmData=allFirmsUsed.map(f=>{
    const fe=inView.filter(r=>r.firm===f);
    return {f,total:fe.reduce((s,r)=>s+toEUR(r),0),n:fe.length};
  }).sort((a,b)=>b.total-a.total);

  // CRUD
  const submit=()=>{
    if(!form.desc||!form.amount) return;
    const row={
      id:form.id||String(Date.now()), date:form.date, type:form.type,
      cat:form.cat, firm:form.firm||"", desc:form.desc,
      currency:form.currency, rate:form.currency==="USD"?parseFloat(form.rate)||null:null,
      amount:parseFloat(form.amount), grossAmountNative:parseFloat(form.grossAmountNative)||null,
      splitEnabled:form.splitEnabled, splitPct:form.splitEnabled?parseFloat(form.splitPct)||null:null,
      deductEnabled:form.deductEnabled,
      feeIntermediary:form.deductEnabled?parseFloat(form.feeIntermediary)||0:null,
      feeTransfer:form.deductEnabled?parseFloat(form.feeTransfer)||0:null,
      files:form.files||[],
    };
    const newRows=form.id?rows.map(r=>r.id===form.id?row:r):[row,...rows];
    setRows(newRows); saveEntry(row); setForm(null);
  };

  const del=id=>{
    if(!window.confirm("¿Eliminar este registro?")) return;
    const newRows=rows.filter(r=>r.id!==id);
    setRows(newRows); deleteEntry(id);
  };

  const openEdit=r=>setForm(recalc({
    ...EMPTY,...r,
    grossAmountNative:r.grossAmountNative?.toString()||r.amount?.toString()||"",
    splitPct:r.splitPct?.toString()||"",
    feeIntermediary:r.feeIntermediary?.toString()||"",
    feeTransfer:r.feeTransfer?.toString()||"",
    rate:r.rate?.toString()||"", amount:r.amount?.toString()||"",
  }));

  // Comprime imágenes a máx 1280px y JPEG 0.7 para que quepan en Firebase
  const compressImage = (dataUrl, mime) => new Promise((resolve)=>{
    if(!mime.startsWith("image/")){ resolve(dataUrl); return; }
    const img = new Image();
    img.onload = ()=>{
      const MAX = 1280;
      let {width, height} = img;
      if(width>MAX || height>MAX){
        if(width>height){ height=Math.round(height*MAX/width); width=MAX; }
        else { width=Math.round(width*MAX/height); height=MAX; }
      }
      const canvas = document.createElement("canvas");
      canvas.width=width; canvas.height=height;
      canvas.getContext("2d").drawImage(img,0,0,width,height);
      resolve(canvas.toDataURL("image/jpeg",0.7));
    };
    img.onerror = ()=>resolve(dataUrl);
    img.src = dataUrl;
  });

  // Paste from clipboard
  useEffect(()=>{
    if(!form) return;
    const onPaste=e=>{
      const items=e.clipboardData?.items; if(!items) return;
      Array.from(items).forEach(item=>{
        if(!item.type.startsWith("image/")) return;
        const file=item.getAsFile(); if(!file) return;
        const ts=new Date().toISOString().replace(/[:.]/g,"-");
        const r=new FileReader();
        r.onload=async ev=>{
          const compressed=await compressImage(ev.target.result, file.type);
          setForm(f=>({...f,files:[...f.files,{name:`captura-${ts}.jpg`,type:"image/jpeg",data:compressed}]}));
        };
        r.readAsDataURL(file);
      });
    };
    window.addEventListener("paste",onPaste);
    return()=>window.removeEventListener("paste",onPaste);
  },[form]);

  const handleFiles=e=>{
    Array.from(e.target.files).forEach(file=>{
      if(file.size>10*1024*1024){alert("Máx. 10 MB");return;}
      const r=new FileReader();
      r.onload=async ev=>{
        const compressed=await compressImage(ev.target.result, file.type);
        setForm(f=>({...f,files:[...f.files,{name:file.name,type:file.type.startsWith("image/")?"image/jpeg":file.type,data:compressed}]}));
      };
      r.readAsDataURL(file);
    }); e.target.value="";
  };

  // Excel export
  const exportExcel=()=>{
    const XLSX=window.XLSX; const wb=XLSX.utils.book_new();
    const fy_label=fy==="all"?"Todos":fy;
    const C={hdrBg:"0284C7",hdrFg:"FFFFFF",inBg:"F0FDF4",inFg:"15803D",outBg:"FEF2F2",outFg:"DC2626",subtleBg:"F8FAFC",border:"D1D9E6",totalBg:"EFF6FF",totalFg:"1D4ED8"};
    const border={top:{style:"thin",color:{rgb:C.border}},bottom:{style:"thin",color:{rgb:C.border}},left:{style:"thin",color:{rgb:C.border}},right:{style:"thin",color:{rgb:C.border}}};
    const hdrStyle={font:{bold:true,color:{rgb:C.hdrFg},sz:10},fill:{fgColor:{rgb:C.hdrBg}},alignment:{horizontal:"center",vertical:"center"},border};
    const numFmt='#,##0.00" €"', numFmtUSD='"$"#,##0.00';
    const totalInAll=rows.filter(r=>r.type==="in").reduce((s,r)=>s+toEUR(r),0);
    const totalOutAll=rows.filter(r=>r.type==="out").reduce((s,r)=>s+toEUR(r),0);
    const netAll=totalInAll-totalOutAll;
    const s1data=[
      [{v:"TRADINGCTRL — RESUMEN ANUAL",s:{font:{bold:true,sz:14}}}],
      [{v:`Año: ${fy_label}  ·  Workspace: ${workspace}  ·  ${new Date().toLocaleDateString("es-ES")}`,s:{font:{sz:9,color:{rgb:"6B7280"}}}}],
      [],
      [{v:"MÉTRICA",s:hdrStyle},{v:"VALOR",s:hdrStyle}],
      [{v:"Total Ingresos",s:{font:{bold:true},fill:{fgColor:{rgb:C.inBg}},border}},{v:totalInAll,s:{numFmt,font:{bold:true,color:{rgb:C.inFg}},fill:{fgColor:{rgb:C.inBg}},border,alignment:{horizontal:"right"}}}],
      [{v:"Total Gastos",s:{font:{bold:true},fill:{fgColor:{rgb:C.outBg}},border}},{v:totalOutAll,s:{numFmt,font:{bold:true,color:{rgb:C.outFg}},fill:{fgColor:{rgb:C.outBg}},border,alignment:{horizontal:"right"}}}],
      [{v:"Beneficio Neto",s:{font:{bold:true},fill:{fgColor:{rgb:C.totalBg}},border}},{v:netAll,s:{numFmt,font:{bold:true,color:{rgb:C.totalFg}},fill:{fgColor:{rgb:C.totalBg}},border,alignment:{horizontal:"right"}}}],
      [{v:"ROI",s:{font:{bold:true},fill:{fgColor:{rgb:C.totalBg}},border}},{v:totalOutAll>0?(netAll/totalOutAll):0,s:{numFmt:"0.00%",font:{bold:true,color:{rgb:C.totalFg}},fill:{fgColor:{rgb:C.totalBg}},border,alignment:{horizontal:"right"}}}],
      [],
      [{v:"Mes",s:hdrStyle},{v:"Ingresos",s:hdrStyle},{v:"Gastos",s:hdrStyle},{v:"Neto",s:hdrStyle}],
      ...MONTHS_FULL.map((name,mi)=>{
        const me=rows.filter(r=>String(getY(r.date))===cyStr&&getM(r.date)===mi);
        const i=me.filter(r=>r.type==="in").reduce((s,r)=>s+toEUR(r),0);
        const o=me.filter(r=>r.type==="out").reduce((s,r)=>s+toEUR(r),0);
        const n=i-o;
        return [{v:name,s:{font:{sz:10},border,fill:{fgColor:{rgb:C.subtleBg}}}},{v:i,s:{numFmt,font:{color:{rgb:C.inFg}},border,alignment:{horizontal:"right"}}},{v:o,s:{numFmt,font:{color:{rgb:C.outFg}},border,alignment:{horizontal:"right"}}},{v:n,s:{numFmt,font:{bold:true,color:{rgb:n>=0?C.inFg:C.outFg}},border,alignment:{horizontal:"right"}}}];
      }),
    ];
    const ws1=XLSX.utils.aoa_to_sheet(s1data);
    ws1["!cols"]=[{wch:28},{wch:18},{wch:18},{wch:18}];
    XLSX.utils.book_append_sheet(wb,ws1,"Resumen");

    const headers=["Fecha","Tipo","PropFirm","Categoría","Descripción","Moneda","Bruto","Split %","Fee Interm.","Fee Transfer.","Neto (orig.)","TC EUR/USD","Neto EUR"];
    const s2rows=[
      headers.map(h=>({v:h,s:hdrStyle})),
      ...inView.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>{
        const isIn=r.type==="in"; const bg=isIn?C.inBg:C.outBg;
        const cell=(v,extra={})=>({v,s:{font:{sz:10,...(extra.font||{})},fill:{fgColor:{rgb:bg}},border,alignment:{horizontal:"left",...(extra.align||{})}}});
        return [
          cell(r.date),{v:isIn?"▲ Ingreso":"▼ Gasto",s:{font:{bold:true,color:{rgb:isIn?C.inFg:C.outFg},sz:10},fill:{fgColor:{rgb:bg}},border}},
          cell(r.firm||""),cell(r.cat),cell(r.desc+(r.splitPct?` [${r.splitPct}% split]`:"")),cell(r.currency||"EUR"),
          {v:r.grossAmountNative||"",s:{numFmt:r.currency==="USD"?numFmtUSD:numFmt,font:{sz:10,color:{rgb:"6B7280"}},fill:{fgColor:{rgb:bg}},border,alignment:{horizontal:"right"}}},
          {v:r.splitPct?r.splitPct/100:"",s:{numFmt:"0%",font:{sz:10},fill:{fgColor:{rgb:bg}},border,alignment:{horizontal:"center"}}},
          {v:r.feeIntermediary||"",s:{numFmt:r.currency==="USD"?numFmtUSD:numFmt,font:{sz:10,color:{rgb:C.outFg}},fill:{fgColor:{rgb:bg}},border,alignment:{horizontal:"right"}}},
          {v:r.feeTransfer||"",s:{numFmt:r.currency==="USD"?numFmtUSD:numFmt,font:{sz:10,color:{rgb:C.outFg}},fill:{fgColor:{rgb:bg}},border,alignment:{horizontal:"right"}}},
          {v:r.amount,s:{numFmt:r.currency==="USD"?numFmtUSD:numFmt,font:{bold:true,sz:10,color:{rgb:isIn?C.inFg:C.outFg}},fill:{fgColor:{rgb:bg}},border,alignment:{horizontal:"right"}}},
          {v:r.rate||"",s:{numFmt:"0.0000",font:{sz:10,color:{rgb:"6B7280"}},fill:{fgColor:{rgb:bg}},border,alignment:{horizontal:"center"}}},
          {v:toEUR(r),s:{numFmt,font:{bold:true,sz:10,color:{rgb:isIn?"15803D":C.outFg}},fill:{fgColor:{rgb:bg}},border,alignment:{horizontal:"right"}}},
        ];
      }),
    ];
    const ws2=XLSX.utils.aoa_to_sheet(s2rows);
    ws2["!cols"]=[{wch:12},{wch:12},{wch:18},{wch:22},{wch:30},{wch:8},{wch:14},{wch:9},{wch:13},{wch:14},{wch:14},{wch:11},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws2,"Registros");

    if(firmData.length>0){
      const s3=[
        [{v:"PropFirm",s:hdrStyle},{v:"Nº Retiros",s:hdrStyle},{v:"Total EUR",s:hdrStyle},{v:"Media/retiro",s:hdrStyle}],
        ...firmData.map(({f,total,n})=>[
          {v:f,s:{font:{bold:true,sz:10},fill:{fgColor:{rgb:"EFF6FF"}},border}},
          {v:n,s:{font:{sz:10},fill:{fgColor:{rgb:"EFF6FF"}},border,alignment:{horizontal:"center"}}},
          {v:total,s:{numFmt,font:{bold:true,sz:10,color:{rgb:C.inFg}},fill:{fgColor:{rgb:"EFF6FF"}},border,alignment:{horizontal:"right"}}},
          {v:n?total/n:0,s:{numFmt,font:{sz:10,color:{rgb:"6B7280"}},fill:{fgColor:{rgb:"EFF6FF"}},border,alignment:{horizontal:"right"}}},
        ]),
      ];
      const ws3=XLSX.utils.aoa_to_sheet(s3);
      ws3["!cols"]=[{wch:28},{wch:14},{wch:16},{wch:18}];
      XLSX.utils.book_append_sheet(wb,ws3,"PropFirms");
    }
    XLSX.writeFile(wb,`TradingCTRL-${fy_label}.xlsx`);
  };

  const periodOpts=fperiod==="month"?MONTHS_FULL.map((l,i)=>({v:String(i),l})):TRIQS.map((t,i)=>({v:String(i),l:`${t.s} (${MONTHS[t.months[0]]}–${MONTHS[t.months[2]]})`}));
  const isRetiro=form?.cat==="Retiro PropFirm"&&form?.type==="in";
  const sym=form?.currency==="USD"?"$":"€";
  const fmtN=n=>form?.currency==="USD"?fU(n):fE(n);

  const syncColor=syncStatus==="ok"?"#15803d":syncStatus==="error"?"#dc2626":"#f59e0b";
  const syncLabel=syncStatus==="ok"?"Sincronizado":syncStatus==="error"?"Error de sync":"Sincronizando…";

  return (
    <div style={{minHeight:"100vh",background:"#eef1f6",fontFamily:"'IBM Plex Mono','Fira Mono',monospace",color:"#111827"}}>

      {/* Header */}
      <div className="hdr">
        <div className="hdr-inner">
          <div className="logo">TRADING<span>CTRL</span></div>
          <div style={{display:"flex",gap:2,marginLeft:8}}>
            <button className={`tab${tab==="dash"?" on":""}`} onClick={()=>setTab("dash")}>Overview</button>
            <button className={`tab${tab==="log"?" on":""}`} onClick={()=>setTab("log")}>Registros</button>
          </div>
          {/* Sync status */}
          <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:8,fontSize:10,color:syncColor,fontWeight:500}}>
            <span className="sync-dot" style={{background:syncColor,width:7,height:7,borderRadius:"50%",animation:syncStatus==="syncing"?"pulse 1.2s infinite":""}}/>
            {syncLabel}
          </div>
          <div style={{flex:1}}/>
          <button className="ghost" onClick={exportExcel}><Ic d={ICONS.dl} s={13} c="#15803d"/> Excel</button>
          <button className="ghost" style={{fontSize:10,color:"#9ca3af"}} onClick={()=>{if(window.confirm("¿Desconectar y borrar configuración local?")) onReset();}}>
            <Ic d={ICONS.settings} s={13} c="#9ca3af"/>
          </button>
          <button className="btn" onClick={()=>setForm({...EMPTY})}>
            <Ic d={ICONS.plus} s={13} c="#fff"/> Nueva entrada
          </button>
        </div>
      </div>

      <div style={{maxWidth:1280,margin:"0 auto",padding:"22px 24px"}}>

        {/* Filters */}
        <div style={{display:"flex",gap:8,marginBottom:22,flexWrap:"wrap",alignItems:"center"}}>
          <select className="sel" style={{width:"auto",fontSize:11}} value={fy} onChange={e=>setFy(e.target.value)}>
            <option value="all">Todos los años</option>
            {years.map(y=><option key={y}>{y}</option>)}
          </select>
          <div className="seg">
            {[["month","Mes"],["quarter","Trimestre"]].map(([v,l])=>(
              <button key={v} className={`seg-o${fperiod===v?" on-neutral":""}`} onClick={()=>{setFperiod(v);setFidx("all");}}>{l}</button>
            ))}
          </div>
          <select className="sel" style={{width:"auto",fontSize:11}} value={fidx} onChange={e=>setFidx(e.target.value)}>
            <option value="all">{fperiod==="month"?"Todos los meses":"Todos los trimestres"}</option>
            {periodOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
          </select>
          <div className="seg">
            {[["all","Todo"],["in","Ingresos"],["out","Gastos"]].map(([v,l])=>(
              <button key={v} className={`seg-o${ftype===v?" on-neutral":""}`} onClick={()=>setFtype(v)}>{l}</button>
            ))}
          </div>
          {allFirmsUsed.length>0&&(
            <select className="sel" style={{width:"auto",fontSize:11}} value={ffirm} onChange={e=>setFfirm(e.target.value)}>
              <option value="all">Todas las firmas</option>
              {allFirmsUsed.map(f=><option key={f} value={f}>{f}</option>)}
            </select>
          )}
          <span style={{marginLeft:"auto",fontSize:10,color:"#6b7280",fontWeight:500}}>{inView.length} registros · <strong style={{color:"#0284c7"}}>{workspace}</strong></span>
        </div>

        {/* ── OVERVIEW ── */}
        {tab==="dash"&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))",gap:12,marginBottom:16}}>
            {[
              {l:"INGRESOS",v:fmtD(totalIn),c:"#15803d",bg:"#f0fdf4",bc:"#bbf7d0",sub:`${inView.filter(r=>r.type==="in").length} entradas`},
              {l:"GASTOS",v:fmtD(totalOut),c:"#dc2626",bg:"#fef2f2",bc:"#fecaca",sub:`${inView.filter(r=>r.type==="out").length} entradas`},
              {l:"BENEFICIO NETO",v:fmtD(net),c:net>=0?"#15803d":"#dc2626",bg:net>=0?"#f0fdf4":"#fef2f2",bc:net>=0?"#bbf7d0":"#fecaca",sub:net>=0?"en positivo":"en negativo"},
              {l:"ROI",v:roi!==null?fP(roi):"—",c:roi>=0?"#0284c7":"#dc2626",bg:"#f0f9ff",bc:"#bae6fd",sub:"retorno s/ coste"},
            ].map(k=>(
              <div key={k.l} style={{background:k.bg,border:`1.5px solid ${k.bc}`,borderRadius:10,padding:18}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:9,color:"#6b7280",letterSpacing:"2px",fontWeight:600}}>{k.l}</div>
                  <span style={{fontSize:8,background:"#fff",border:"1px solid #d1d9e6",borderRadius:3,padding:"1px 5px",color:"#6b7280",fontWeight:600,letterSpacing:1}}>{currLabel}</span>
                </div>
                <div className="kpi-val" style={{fontSize:28,color:k.c,lineHeight:1}}>{k.v}</div>
                <div style={{fontSize:10,color:"#6b7280",marginTop:6}}>{k.sub}</div>
              </div>
            ))}
          </div>

          {displayCurrency==="MIX"&&(
            <div style={{marginBottom:16,padding:"9px 14px",background:"#fefce8",border:"1.5px solid #fde68a",borderRadius:6,fontSize:10,color:"#a16207",fontWeight:500}}>
              ⚠️ Los registros visibles mezclan EUR y USD. Los totales suman ambas monedas como si fueran la misma — filtra por tipo de moneda o añade tipos de cambio para ver valores correctamente convertidos.
            </div>
          )}

          <div className="card" style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <span style={{fontSize:10,color:"#374151",letterSpacing:"1.5px",fontWeight:600}}>RENDIMIENTO MENSUAL — {cyStr}</span>
              <div style={{display:"flex",gap:18}}>
                <span style={{fontSize:10,color:"#374151"}}>■ <span style={{color:"#15803d"}}>Ingresos</span></span>
                <span style={{fontSize:10,color:"#374151"}}>■ <span style={{color:"#dc2626"}}>Gastos</span></span>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:4,height:100,alignItems:"flex-end"}}>
              {monthly.map(m=>{
                const iH=(m.i/maxBar)*84,oH=(m.o/maxBar)*84;
                const isActive=fperiod==="month"&&fidx===String(m.mi);
                return (
                  <div key={m.mi} onClick={()=>{setFperiod("month");setFidx(isActive?"all":String(m.mi));}}
                    style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",height:100,justifyContent:"flex-end",opacity:fidx==="all"||isActive?1:.2,transition:"opacity .2s"}}>
                    <div style={{display:"flex",gap:2,alignItems:"flex-end"}}>
                      <div style={{width:7,borderRadius:"3px 3px 0 0",background:isActive?"#16a34a":"#86efac",height:iH,minHeight:m.i>0?2:0}}/>
                      <div style={{width:7,borderRadius:"3px 3px 0 0",background:isActive?"#dc2626":"#fca5a5",height:oH,minHeight:m.o>0?2:0}}/>
                    </div>
                    <div style={{fontSize:8,color:isActive?"#0284c7":"#9ca3af",marginTop:2,fontWeight:isActive?700:400}}>{MONTHS[m.mi]}</div>
                  </div>
                );
              })}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:4,marginTop:10,borderTop:"1.5px solid #e5e9f0",paddingTop:8}}>
              {monthly.map(m=>{
                const sym = displayCurrency==="USD"?"$":"€";
                const txt = m.net===0 ? "·" : (m.net>0?"+":"")+Math.round(m.net)+sym;
                return <div key={m.mi} style={{textAlign:"center",fontSize:8,color:m.net>0?"#15803d":m.net<0?"#dc2626":"#d1d9e6",fontWeight:m.net!==0?600:400}}>{txt}</div>;
              })}
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:firmData.length>0?"1fr 1fr":"1fr",gap:14}}>
            {firmData.length>0&&(
              <div className="card">
                <div style={{fontSize:10,color:"#374151",letterSpacing:"1.5px",fontWeight:600,marginBottom:16}}>PROPFIRM BREAKDOWN</div>
                {firmData.map(({f,total,n})=>{
                  const max=Math.max(...firmData.map(x=>Math.abs(x.total)),1);
                  return <div key={f} style={{marginBottom:13}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}><span className="badge-firm">{f}</span><span style={{fontSize:9,color:"#9ca3af"}}>{n} op</span></div>
                      <span style={{fontSize:12,color:total>=0?"#15803d":"#dc2626",fontWeight:600}}>{fmtD(total)}</span>
                    </div>
                    <div className="bar-wrap"><div className="bar-fill" style={{width:`${(Math.abs(total)/max)*100}%`,background:"linear-gradient(90deg,#0284c7,#15803d)"}}/></div>
                  </div>;
                })}
              </div>
            )}
            <div className="card">
              <div style={{fontSize:10,color:"#374151",letterSpacing:"1.5px",fontWeight:600,marginBottom:16}}>CATEGORÍAS</div>
              {(()=>{
                const cats=[...CAT_IN,...CAT_OUT].reduce((acc,cat)=>{
                  const t=inView.filter(r=>r.cat===cat).reduce((s,r)=>s+toEUR(r),0);
                  if(t>0) acc[cat]=t; return acc;
                },{});
                if(!Object.keys(cats).length) return <div style={{color:"#9ca3af",fontSize:11,textAlign:"center",padding:"20px 0"}}>Sin datos aún</div>;
                const max=Math.max(...Object.values(cats));
                return Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,total])=>{
                  const isIn=CAT_IN.includes(cat);
                  return <div key={cat} style={{marginBottom:11}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <span style={{fontSize:10,color:"#374151",fontWeight:500}}>{cat}</span>
                      <span style={{fontSize:10,color:isIn?"#15803d":"#dc2626",fontWeight:600}}>{fmtD(total)}</span>
                    </div>
                    <div className="bar-wrap"><div className="bar-fill" style={{width:`${(total/max)*100}%`,background:isIn?"#16a34a":"#dc2626"}}/></div>
                  </div>;
                });
              })()}
            </div>
          </div>
        </>}

        {/* ── REGISTROS ── */}
        {tab==="log"&&(
          <div className="card">
            <div style={{overflowX:"auto"}}>
              {inView.length===0&&<div style={{textAlign:"center",color:"#9ca3af",padding:"48px 0",fontSize:12}}>Sin registros. Pulsa «Nueva entrada».</div>}
              {inView.length>0&&(
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr style={{borderBottom:"2px solid #e5e9f0"}}>
                      {["FECHA","TIPO","PROPFIRM","CATEGORÍA","DESCRIPCIÓN","BRUTO","NETO","EUR","DOCS",""].map(h=>(
                        <th key={h} style={{textAlign:"left",padding:"9px 12px",color:"#6b7280",fontWeight:600,fontSize:9,letterSpacing:"1.2px",whiteSpace:"nowrap",background:"#f8fafc"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[...inView].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>(
                      <tr key={r.id} className="trow" style={{borderBottom:"1px solid #f0f4f8"}}>
                        <td style={{padding:"10px 12px",color:"#4b5563",whiteSpace:"nowrap",fontSize:10,fontWeight:500}}>{r.date}</td>
                        <td style={{padding:"10px 12px"}}><span className={r.type==="in"?"badge-in":"badge-out"}>{r.type==="in"?"▲ ING":"▼ GAS"}</span></td>
                        <td style={{padding:"10px 12px"}}>{r.firm&&<span className="badge-firm">{r.firm}</span>}</td>
                        <td style={{padding:"10px 12px",color:"#6b7280",fontSize:10,fontWeight:500}}>{r.cat}</td>
                        <td style={{padding:"10px 12px",color:"#374151",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500}}>
                          {r.desc}{r.splitEnabled&&r.splitPct&&<span className="badge-split">{r.splitPct}%</span>}
                        </td>
                        <td style={{padding:"10px 12px",color:"#9ca3af",fontSize:10}}>
                          {r.grossAmountNative?(r.currency==="USD"?fU(r.grossAmountNative):fE(r.grossAmountNative)):"—"}
                        </td>
                        <td style={{padding:"10px 12px",color:r.type==="in"?"#15803d":"#dc2626",fontWeight:700}}>
                          {r.type==="in"?"+":"-"}{r.currency==="USD"?fU(r.amount):fE(r.amount)}
                        </td>
                        <td style={{padding:"10px 12px",color:"#0284c7",fontWeight:600,whiteSpace:"nowrap",fontSize:11}}>
                          {r.currency==="USD"&&r.rate?fE(toEUR(r)):"—"}
                        </td>
                        <td style={{padding:"10px 12px"}}>
                          {r.files?.length>0&&<button className="chip" onClick={()=>setPreview(r.files[0])}><Ic d={ICONS.clip} s={9} c="#0284c7"/>{r.files.length}</button>}
                        </td>
                        <td style={{padding:"10px 12px"}}>
                          <div style={{display:"flex",gap:5}}>
                            <button className="ghost" style={{padding:"4px 9px"}} onClick={()=>openEdit(r)}><Ic d={ICONS.edit} s={11} c="#4b5563"/></button>
                            <button className="ghost" style={{padding:"4px 9px",borderColor:"#fecaca"}} onClick={()=>del(r.id)}><Ic d={ICONS.trash} s={11} c="#dc2626"/></button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </div>
        )}
      </div>

      {/* ── MODAL ── */}
      {form&&(
        <div className="ov">
          <div className="modal">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2}}>{form.id?"EDITAR REGISTRO":"NUEVA ENTRADA"}</div>
              <button style={{background:"none",border:"none",cursor:"pointer",padding:4}} onClick={()=>setForm(null)}><Ic d={ICONS.x} s={18} c="#6b7280"/></button>
            </div>

            <label className="lbl">Tipo</label>
            <div className="seg" style={{marginBottom:16}}>
              <button className={`seg-o${form.type==="in"?" on-in":""}`}
                onClick={()=>patch({type:"in",cat:CAT_IN[0],firm:"",splitEnabled:false,deductEnabled:false,grossAmountNative:"",splitPct:"",feeIntermediary:"",feeTransfer:"",amount:"",rate:""})}>▲ Ingreso</button>
              <button className={`seg-o${form.type==="out"?" on-out":""}`}
                onClick={()=>patch({type:"out",cat:CAT_OUT[0],firm:"",splitEnabled:false,deductEnabled:false,grossAmountNative:"",splitPct:"",feeIntermediary:"",feeTransfer:"",amount:"",rate:""})}>▼ Gasto</button>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              <div><label className="lbl">Fecha</label><input className="inp" type="date" value={form.date} onChange={e=>patch({date:e.target.value})}/></div>
              <div>
                <label className="lbl">Categoría</label>
                <select className="sel" value={form.cat} onChange={e=>patch({cat:e.target.value,splitEnabled:false,deductEnabled:false,grossAmountNative:"",splitPct:"",feeIntermediary:"",feeTransfer:"",amount:""})}>
                  {(form.type==="in"?CAT_IN:CAT_OUT).map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
            </div>

            {form.type==="in"&&(
              <div style={{marginBottom:14}}>
                <label className="lbl">PropFirm<span className="lbl-note">— opcional</span></label>
                <select className="sel" value={form.firm} onChange={e=>patch({firm:e.target.value})}>
                  <option value="">— Sin PropFirm —</option>
                  <optgroup label="Forex / CFD">{PROPFIRMS_FOREX.map(f=><option key={f}>{f}</option>)}</optgroup>
                  <optgroup label="Futuros">{PROPFIRMS_FUTURES.map(f=><option key={f}>{f}</option>)}</optgroup>
                </select>
              </div>
            )}

            <div style={{marginBottom:14}}>
              <label className="lbl">Descripción</label>
              <input className="inp" type="text" placeholder="Ej: Retiro FTMO 100K, Challenge TradingView…" value={form.desc} onChange={e=>patch({desc:e.target.value})}/>
            </div>

            {/* Flujo retiro PropFirm */}
            {isRetiro&&<>
              <label className="lbl">Moneda recibida</label>
              <div className="seg" style={{marginBottom:14}}>
                <button className={`seg-o${form.currency==="EUR"?" on-neutral":""}`} onClick={()=>patch({currency:"EUR",rate:"",grossAmountNative:"",amount:""})}>€ EUR</button>
                <button className={`seg-o${form.currency==="USD"?" on-neutral":""}`} onClick={()=>patch({currency:"USD",grossAmountNative:"",amount:""})}>$ USD</button>
              </div>

              <div style={{marginBottom:14}}>
                <label className="lbl">Importe bruto recibido <span className="lbl-note">({form.currency})</span></label>
                <div style={{position:"relative"}}>
                  <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#6b7280",fontWeight:600,pointerEvents:"none"}}>{sym}</span>
                  <input className="inp" type="number" min="0" step="0.01" placeholder="0.00" value={form.grossAmountNative} onChange={e=>patch({grossAmountNative:e.target.value})} style={{paddingLeft:24}}/>
                </div>
              </div>

              <div className="split-box">
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:form.splitEnabled?14:0}}>
                  <div><span style={{fontSize:10,color:"#0284c7",letterSpacing:"1px",fontWeight:700,textTransform:"uppercase"}}>Profit Split</span><span className="lbl-note" style={{marginLeft:8}}>opcional</span></div>
                  <Toggle on={form.splitEnabled} onChange={()=>patch({splitEnabled:!form.splitEnabled,splitPct:""})} colorOn="#0284c7"/>
                </div>
                {form.splitEnabled&&<>
                  <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:10,alignItems:"center"}}>
                    <div style={{fontSize:11,color:"#374151",fontWeight:500}}>Porcentaje del trader (tu parte)</div>
                    <div style={{position:"relative"}}>
                      <input className="inp" type="number" min="0" max="100" step="0.5" placeholder="ej: 90" value={form.splitPct} onChange={e=>patch({splitPct:e.target.value})} style={{paddingRight:26,textAlign:"right"}}/>
                      <span style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#6b7280",fontWeight:600,pointerEvents:"none"}}>%</span>
                    </div>
                  </div>
                  {form.splitPct&&form.grossAmountNative&&(()=>{
                    const sp=parseFloat(form.splitPct)/100,g=parseFloat(form.grossAmountNative)||0;
                    return (
                      <div style={{display:"flex",gap:0,marginTop:10,borderRadius:6,overflow:"hidden",border:"1.5px solid #bae6fd"}}>
                        {[{l:`Tú (${form.splitPct}%)`,v:`${sym}${(g*sp).toFixed(2)}`,c:"#15803d",bg:"#f0fdf4"},{l:`PropFirm (${(100-parseFloat(form.splitPct)).toFixed(0)}%)`,v:`${sym}${(g*(1-sp)).toFixed(2)}`,c:"#dc2626",bg:"#fef2f2"}].map(s=>(
                          <div key={s.l} style={{flex:1,padding:"9px 10px",background:s.bg,textAlign:"center"}}>
                            <div style={{fontSize:9,color:"#6b7280",marginBottom:3,fontWeight:500}}>{s.l}</div>
                            <div style={{fontSize:14,color:s.c,fontWeight:700}}>{s.v}</div>
                          </div>
                        ))}
                      </div>
                    );
                  })()}
                </>}
              </div>

              <div className="deduct-box">
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:form.deductEnabled?14:0}}>
                  <div><span style={{fontSize:10,color:"#374151",letterSpacing:"1px",fontWeight:700,textTransform:"uppercase"}}>Deducciones / Comisiones</span><span className="lbl-note" style={{marginLeft:8}}>opcional</span></div>
                  <Toggle on={form.deductEnabled} onChange={()=>patch({deductEnabled:!form.deductEnabled,feeIntermediary:"",feeTransfer:""})} colorOn="#374151"/>
                </div>
                {form.deductEnabled&&<>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                    {[["feeIntermediary","Intermediario","ej: WorkMarket ~$30"],["feeTransfer","Transferencia","ej: Wise ~$6.11"]].map(([k,l,note])=>(
                      <div key={k}>
                        <label className="lbl">{l}<span className="lbl-note">{note}</span></label>
                        <div style={{position:"relative"}}>
                          <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"#6b7280",fontWeight:600,pointerEvents:"none"}}>{sym}</span>
                          <input className="inp" type="number" min="0" step="0.01" placeholder="0.00" value={form[k]} onChange={e=>patch({[k]:e.target.value})} style={{paddingLeft:22}}/>
                        </div>
                      </div>
                    ))}
                  </div>
                  {(form.feeIntermediary||form.feeTransfer)&&(
                    <div style={{fontSize:11,color:"#374151",fontWeight:500,padding:"7px 11px",background:"#fff",borderRadius:5,border:"1.5px solid #e5e9f0"}}>
                      Total comisiones: <strong style={{color:"#dc2626"}}>{sym}{((parseFloat(form.feeIntermediary)||0)+(parseFloat(form.feeTransfer)||0)).toFixed(2)}</strong>
                    </div>
                  )}
                </>}
              </div>

              {form.currency==="USD"&&(
                <div style={{marginBottom:14}}>
                  <label className="lbl">Tipo de cambio EUR/USD</label>
                  <input className="inp" type="number" min="0" step="0.0001" placeholder="ej: 1.0850" value={form.rate} onChange={e=>patch({rate:e.target.value})}/>
                </div>
              )}

              {form.amount&&(
                <div className="summary-box">
                  <div style={{fontSize:9,color:"#6b7280",letterSpacing:"1.5px",fontWeight:700,marginBottom:10}}>RESUMEN DEL RETIRO</div>
                  {[
                    {l:"Bruto recibido",v:fmtN(parseFloat(form.grossAmountNative)||0),show:true},
                    {l:`Después de split (${form.splitPct}%)`,v:fmtN((parseFloat(form.grossAmountNative)||0)*(parseFloat(form.splitPct)/100)),show:form.splitEnabled&&!!form.splitPct},
                    {l:"Comisiones descontadas",v:`- ${sym}${((parseFloat(form.feeIntermediary)||0)+(parseFloat(form.feeTransfer)||0)).toFixed(2)}`,c:"#dc2626",show:form.deductEnabled&&!!(form.feeIntermediary||form.feeTransfer)},
                  ].filter(s=>s.show).map((s,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:s.c||"#374151",fontWeight:500,marginBottom:6}}><span>{s.l}</span><span>{s.v}</span></div>
                  ))}
                  <div style={{height:1.5,background:"#86efac",margin:"8px 0"}}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:700,color:"#15803d"}}>
                    <span>Neto a registrar</span><span>{fmtN(parseFloat(form.amount))}</span>
                  </div>
                  {form.currency==="USD"&&form.rate&&(
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#0284c7",fontWeight:600,marginTop:6}}>
                      <span>≈ EUR (TC {form.rate})</span><span>{fE(parseFloat(form.amount)/parseFloat(form.rate))}</span>
                    </div>
                  )}
                </div>
              )}
            </>}

            {form.type==="in"&&!isRetiro&&(
              <div style={{marginBottom:14}}>
                <label className="lbl">Importe (€)</label>
                <input className="inp" type="number" min="0" step="0.01" placeholder="0.00" value={form.amount} onChange={e=>patch({grossAmountNative:e.target.value,amount:e.target.value})}/>
              </div>
            )}
            {form.type==="out"&&<>
              <label className="lbl">Moneda del gasto</label>
              <div className="seg" style={{marginBottom:14}}>
                <button className={`seg-o${form.currency==="EUR"?" on-neutral":""}`} onClick={()=>patch({currency:"EUR",rate:"",grossAmountNative:"",amount:""})}>€ EUR</button>
                <button className={`seg-o${form.currency==="USD"?" on-neutral":""}`} onClick={()=>patch({currency:"USD",grossAmountNative:"",amount:""})}>$ USD</button>
              </div>

              {form.currency==="EUR"&&(
                <div style={{marginBottom:14}}>
                  <label className="lbl">Importe (€)</label>
                  <input className="inp" type="number" min="0" step="0.01" placeholder="0.00"
                    value={form.amount} onChange={e=>patch({amount:e.target.value})}/>
                </div>
              )}

              {form.currency==="USD"&&<>
                <div style={{marginBottom:14}}>
                  <label className="lbl">Importe ($)</label>
                  <div style={{position:"relative"}}>
                    <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#6b7280",fontWeight:600,pointerEvents:"none"}}>$</span>
                    <input className="inp" type="number" min="0" step="0.01" placeholder="0.00"
                      value={form.grossAmountNative}
                      onChange={e=>{
                        const usdVal = e.target.value;
                        const eur = usdVal && form.rate ? (parseFloat(usdVal)/parseFloat(form.rate)).toFixed(2) : "";
                        patch({grossAmountNative:usdVal, amount:usdVal, eurAmount:eur});
                      }}
                      style={{paddingLeft:22}}/>
                  </div>
                </div>
                <div style={{marginBottom:14}}>
                  <label className="lbl">Tipo de cambio EUR/USD <span className="lbl-note">— opcional, solo para ver equivalente</span></label>
                  <input className="inp" type="number" min="0" step="0.0001" placeholder="ej: 1.0850"
                    value={form.rate}
                    onChange={e=>{
                      const rateVal = e.target.value;
                      const eur = rateVal && form.grossAmountNative ? (parseFloat(form.grossAmountNative)/parseFloat(rateVal)).toFixed(2) : "";
                      patch({rate:rateVal, eurAmount:eur});
                    }}/>
                  {form.rate && form.grossAmountNative && (
                    <div style={{marginTop:8,padding:"8px 12px",background:"#f0f9ff",border:"1.5px solid #bae6fd",borderRadius:6,fontSize:11,color:"#0284c7",fontWeight:600}}>
                      ≈ {fE(parseFloat(form.grossAmountNative)/parseFloat(form.rate))} al TC {form.rate}
                    </div>
                  )}
                </div>
              </>}
            </>}

            <div className="sep"/>
            <label className="lbl">Justificantes</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:10,alignItems:"center"}}>
              {form.files.map((f,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:5}}>
                  {f.type?.startsWith("image/")&&<img src={f.data} className="thumb" alt=""/>}
                  <button className="chip" onClick={()=>setPreview(f)}>
                    <Ic d={ICONS.clip} s={9} c="#0284c7"/>
                    {f.name.length>18?f.name.slice(0,16)+"…":f.name}
                    <span style={{color:"#dc2626",marginLeft:3,fontSize:14,lineHeight:1}} onClick={e=>{e.stopPropagation();patch({files:form.files.filter((_,j)=>j!==i)});}}>×</span>
                  </button>
                </div>
              ))}
              <button className="ghost" style={{fontSize:11}} onClick={()=>fileRef.current.click()}>
                <Ic d={ICONS.clip} s={11} c="#4b5563"/> Adjuntar
              </button>
              <span style={{fontSize:10,color:"#9ca3af",fontStyle:"italic"}}>o pega con Ctrl+V / ⌘V</span>
              <input ref={fileRef} type="file" multiple accept="image/*,application/pdf" style={{display:"none"}} onChange={handleFiles}/>
            </div>

            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button className="ghost" style={{flex:1,justifyContent:"center"}} onClick={()=>setForm(null)}>Cancelar</button>
              <button className="btn" style={{flex:2,justifyContent:"center"}} onClick={submit} disabled={!form.desc||!form.amount}>
                {form.id?"Guardar cambios":"Añadir registro"}
              </button>
            </div>
          </div>
        </div>
      )}

      {preview&&(
        <div className="ov">
          <div style={{background:"#fff",border:"1.5px solid #d1d9e6",borderRadius:12,padding:22,maxWidth:720,width:"100%",maxHeight:"92vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.15)"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,alignItems:"center"}}>
              <span style={{fontSize:12,color:"#4b5563",fontWeight:500}}>{preview.name}</span>
              <button style={{background:"none",border:"none",cursor:"pointer"}} onClick={()=>setPreview(null)}><Ic d={ICONS.x} s={16} c="#6b7280"/></button>
            </div>
            {preview.type?.startsWith("image/")?<img src={preview.data} alt={preview.name} style={{width:"100%",borderRadius:8}}/>:<iframe src={preview.data} title={preview.name} style={{width:"100%",height:500,border:"none",borderRadius:8}}/>}
            <a href={preview.data} download={preview.name} style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:14,fontSize:11,color:"#0284c7",textDecoration:"none",fontWeight:600}}>
              <Ic d={ICONS.dl} s={12} c="#0284c7"/> Descargar archivo
            </a>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────
const HARDCODED_CONFIG = {
  apiKey: "AIzaSyAGGw2IJcSM0zushSUQv-SNmOm6mkTlY_g",
  authDomain: "ocbt-tracker.firebaseapp.com",
  databaseURL: "https://ocbt-tracker-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ocbt-tracker",
  storageBucket: "ocbt-tracker.firebasestorage.app",
  messagingSenderId: "66862519015",
  appId: "1:66862519015:web:f48844e5fe0d4997890842"
};
const HARDCODED_WORKSPACE = "OCBT";

function Root() {
  const [dbInst, setDbInst] = useState(null);

  useEffect(()=>{
    try {
      if(firebase.apps.length===0) firebase.initializeApp(HARDCODED_CONFIG);
      setDbInst(firebase.database());
    } catch(e) {
      console.error("Firebase init error:", e);
    }
  },[]);

  if(!dbInst) return (
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#eef1f6"}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,color:"#0284c7"}}>Conectando…</div>
    </div>
  );

  return <TradingApp db={dbInst} workspace={HARDCODED_WORKSPACE} onReset={()=>{}} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
