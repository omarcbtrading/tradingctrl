<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TradingCTRL</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#eef1f6;color:#111827;font-family:'IBM Plex Mono','Fira Mono',monospace;}
    ::-webkit-scrollbar{width:5px;background:#e5e9f0;}
    ::-webkit-scrollbar-thumb{background:#b0bac8;border-radius:3px;}
    .hdr{background:#fff;border-bottom:2px solid #d1d9e6;position:sticky;top:0;z-index:40;box-shadow:0 1px 4px rgba(0,0,0,.06);}
    .hdr-inner{max-width:1280px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:23px;letter-spacing:3px;color:#111827;}
    .logo span{color:#0284c7;}
    .tab{background:none;border:none;cursor:pointer;padding:6px 14px;border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;color:#6b7280;transition:all .15s;text-transform:uppercase;font-weight:500;}
    .tab:hover{color:#111827;background:#f0f4f8;}
    .tab.on{color:#0284c7;background:#e0f0fb;border-bottom:2px solid #0284c7;}
    .btn{background:#0284c7;color:#fff;border:none;padding:9px 18px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;text-transform:uppercase;}
    .btn:hover{background:#0369a1;box-shadow:0 2px 10px rgba(2,132,199,.25);}
    .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
    .btn-green{background:#15803d;}.btn-green:hover{background:#166534;box-shadow:0 2px 10px rgba(21,128,61,.25);}
    .ghost{background:#fff;color:#4b5563;border:1.5px solid #d1d9e6;padding:7px 13px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;letter-spacing:.5px;font-weight:500;}
    .ghost:hover{color:#111827;border-color:#9ca3af;background:#f8fafc;}
    .card{background:#fff;border:1.5px solid #d1d9e6;border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
    .inp{background:#f8fafc;border:1.5px solid #cbd5e1;border-radius:6px;padding:10px 13px;color:#111827;font-family:'IBM Plex Mono',monospace;font-size:12px;width:100%;outline:none;transition:border-color .15s;}
    .inp:focus{border-color:#0284c7;background:#fff;box-shadow:0 0 0 3px rgba(2,132,199,.1);}
    .inp::placeholder{color:#aab4c4;}
    .inp.computed{border-color:#0284c7;color:#0284c7;background:#e8f4fc;cursor:default;font-weight:600;}
    .inp-ta{background:#f8fafc;border:1.5px solid #cbd5e1;border-radius:6px;padding:10px 13px;color:#111827;font-family:'IBM Plex Mono',monospace;font-size:11px;width:100%;outline:none;resize:vertical;min-height:90px;transition:border-color .15s;}
    .inp-ta:focus{border-color:#0284c7;background:#fff;box-shadow:0 0 0 3px rgba(2,132,199,.1);}
    .sel{background:#f8fafc;border:1.5px solid #cbd5e1;border-radius:6px;padding:10px 13px;color:#111827;font-family:'IBM Plex Mono',monospace;font-size:12px;width:100%;outline:none;cursor:pointer;}
    .sel:focus{border-color:#0284c7;}
    .lbl{font-size:10px;color:#374151;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:block;font-weight:600;}
    .lbl-note{font-size:9px;color:#9ca3af;letter-spacing:0;text-transform:none;font-weight:400;margin-left:4px;}
    .seg{display:flex;border:1.5px solid #d1d9e6;border-radius:6px;overflow:hidden;background:#f0f4f8;}
    .seg-o{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:11px;border:none;font-family:'IBM Plex Mono',monospace;transition:all .15s;letter-spacing:.5px;font-weight:500;background:transparent;color:#6b7280;}
    .seg-o.on-in{background:#dcfce7;color:#15803d;font-weight:600;}
    .seg-o.on-out{background:#fee2e2;color:#dc2626;font-weight:600;}
    .seg-o.on-neutral{background:#e0f0fb;color:#0284c7;font-weight:600;}
    .badge-in{background:#dcfce7;color:#15803d;border:1.5px solid #86efac;padding:2px 9px;border-radius:4px;font-size:9px;letter-spacing:1px;white-space:nowrap;font-weight:600;}
    .badge-out{background:#fee2e2;color:#dc2626;border:1.5px solid #fca5a5;padding:2px 9px;border-radius:4px;font-size:9px;letter-spacing:1px;white-space:nowrap;font-weight:600;}
    .badge-firm{background:#eff6ff;color:#1d4ed8;border:1.5px solid #bfdbfe;padding:2px 9px;border-radius:4px;font-size:9px;white-space:nowrap;font-weight:500;}
    .badge-usd{background:#fefce8;color:#a16207;border:1.5px solid #fde68a;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:600;}
    .badge-split{background:#f0f9ff;color:#0284c7;border:1.5px solid #bae6fd;padding:1px 6px;border-radius:3px;font-size:8px;font-weight:600;margin-left:5px;}
    .trow:hover td{background:#f8fafc;}
    .ov{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);}
    .modal{background:#fff;border:1.5px solid #d1d9e6;border-radius:12px;width:100%;max-width:580px;max-height:94vh;overflow-y:auto;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
    .chip{background:#f0f4f8;border-radius:4px;padding:3px 9px;font-size:10px;color:#374151;display:flex;align-items:center;gap:5px;border:1.5px solid #d1d9e6;cursor:pointer;transition:all .15s;font-weight:500;}
    .chip:hover{background:#e0f0fb;color:#0284c7;border-color:#bae6fd;}
    .sep{height:1.5px;background:#e5e9f0;margin:16px 0;}
    .bar-wrap{height:4px;background:#e5e9f0;border-radius:2px;overflow:hidden;margin-top:5px;}
    .bar-fill{height:100%;border-radius:2px;}
    .kpi-val{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;}
    .toggle{width:36px;height:20px;border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none;}
    .toggle-knob{position:absolute;top:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
    .split-box{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:8px;padding:14px;margin-bottom:14px;}
    .deduct-box{background:#fafbfc;border:1.5px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:14px;}
    .summary-box{background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:14px;margin-bottom:4px;}
    /* Setup screen */
    .setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#eef1f6;}
    .setup-card{background:#fff;border:1.5px solid #d1d9e6;border-radius:16px;padding:40px;max-width:640px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);}
    .step-num{width:28px;height:28px;border-radius:50%;background:#0284c7;color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
    .step-row{display:flex;gap:14px;align-items:flex-start;margin-bottom:20px;}
    .step-text{font-size:12px;color:#374151;line-height:1.8;}
    .step-text strong{color:#111827;}
    .step-text code{background:#f0f4f8;border:1px solid #d1d9e6;border-radius:3px;padding:1px 5px;font-size:11px;color:#0284c7;}
    .sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    .syncing{animation:pulse 1.2s infinite;}
    /* Img paste preview */
    .thumb{width:40px;height:40px;object-fit:cover;border-radius:4px;border:1.5px solid #d1d9e6;}
  </style>
</head>
